name: Bug report
description: Registrar un defecto encontrado durante la sesión de testing
title: "[BUG] "
labels: ["bug", "pendiente-triage"]

body:
  - type: input
    id: resumen
    attributes:
      label: Resumen
      placeholder: Describe el defecto en una línea
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a...
        2. Hacer clic en...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Resultado esperado
    validations:
      required: true

  - type: dropdown
    id: severidad
    attributes:
      label: Severidad
      options:
        - Alta
        - Media
        - Baja
    validations:
      required: true

  - type: textarea
    id: evidencia
    attributes:
      label: Evidencia (links o imágenes)
